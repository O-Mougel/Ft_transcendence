server {
	listen 443 ssl;
	listen [::]:443 ssl;

	server_name zigotos.42.fr www.zigotos.42.fr; # maybe change this 
	client_max_body_size 5M;

	ssl_certificate /etc/ssl/certs/transcendence.crt;
	ssl_certificate_key /etc/ssl/private/transcendence.key;
	ssl_protocols TLSv1.3;
	

	root /var/www/html;
	index src/index.html index.html;
	
	location /css/ {
		alias /var/www/html/src/css/;
		try_files $uri =404;
	}
	
	location /js/ {
		alias /var/www/html/src/js/;
		try_files $uri =404;
	}

	location /views/ {
		alias /var/www/html/src/views/;
		try_files $uri =404;
	}

	location /fonts/ {
		alias /var/www/html/src/fonts/;
		try_files $uri =404;
	}

	location /img/ {
		alias /var/www/html/src/img/;
		try_files $uri =404;
	}

	location /game/ {
		alias /var/www/html/src/game/; 
		try_files $uri =404;
	}

	location ^~ /friend {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /profile/ {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /login {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /logout {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /register {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /file_upload {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    } 
	
	location ^~ /match {
        proxy_pass http://back:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # location ^~ /match/internal {
    #     return 404;
    # }

    # Pong REST API (Command Line Interface + Web)
    location ^~ /api/pong/ {
        proxy_pass http://back:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pong socket.io (wss)
    location /pong/socket.io/ {
        proxy_pass http://back:3002/pong/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


	location / {
		try_files $uri $uri/ /var/www/html/src/index.html;
	}
}
