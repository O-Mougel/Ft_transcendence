services:
  nginx:
    build: ./docker/nginx
    container_name: nginx
    depends_on:
     - front
     - back
    ports:
     - "4430:443"
    networks:
     - transcendence
    volumes:
     - front:/var/www/html
     - images:/var/www/html/src/img/userPfp
    restart: on-failure

  front:
    build:
      context: ./front/
      dockerfile: ../docker/front/Dockerfile
    container_name: front
    depends_on:
     - back
    # ports: 
    #  - "8080:3001"
    # expose:
    #   - "3001" #or 8080 idk maybe some changes in nginx needed 
    # WTF??? WHERE IS THIS USED ?? (USELESS?)
    networks:
     - transcendence
    volumes:
      - front:/usr/src/app
      - ./front/src/ts:/usr/src/app/src/ts #remove when in production
    restart: on-failure

  back:
    build: 
      context: ./back/server/.
      dockerfile: ../../docker/back/Dockerfile
    container_name: back 
    environment:
      - JWT_SECRET=supersecret_here #changer avant de rendre
    volumes:
      - db:/home/prisma
      - ./back/server/src:/home/src #remove when in production
      - images:/home/front/src/img/userPfp #used for profile pic upload by user
    networks:
      - transcendence
    restart: on-failure
    # ports:
    #   - "3000:3000" #ne pas oublier d'enlever au moment de rendre le projet
    expose: 
      - "3000"
      - "3002"
    command: npm run dev #remove when in production

networks:
  transcendence:
    driver: bridge

volumes:
  db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: 'back/volume'
  front:
  images:

