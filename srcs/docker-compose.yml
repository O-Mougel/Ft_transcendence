services:
  nginx:
    build: docker/nginx/.
    env_file: ../.env
    container_name: nginx
    depends_on:
      - front
      - back
        #ports:
        #- "443:443"
        #    volumes:
        #      - front:/
    networks:
      - transcendence
    restart: on-failure

  front:
    build: docker/front/.
    env_file: ../.env
    container_name: front
    depends_on:
      - back
    volumes:
      - front:/home
    networks:
      - transcendence
    restart: on-failure
      #    expose:
      #      - ""

  back:
    build: docker/back/.
    env_file: ../.env
    container_name: back 
    volumes:
      - back:/home
    networks:
      - transcendence
    restart: on-failure
    ports:
      - "3000:3000"
        #expose:
        #- "3000"

networks:
  transcendence:
    driver: bridge

volumes:
  back:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: 'back/'

  front:
    driver: local
    driver_opts:
      type: 'none' 
      o: 'bind'
      device: 'front/'
