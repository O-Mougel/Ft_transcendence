services:
  nginx:
    build: ./docker/nginx
    container_name: nginx
    depends_on:
     - front
     - back
    ports:
     - "4430:443"
    networks:
     - transcendence
    volumes:
     - front:/var/www/html
     - images:/var/www/html/src/img/userPfp
    restart: on-failure

  front:
    build:
      context: ./front/
      dockerfile: ../docker/front/Dockerfile
    container_name: front
    depends_on:
     - back
    networks:
     - transcendence
    volumes:
      - front:/usr/src/app
    restart: on-failure

  back:
    build: 
      context: ./back/server/.
      dockerfile: ../../docker/back/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-$(openssl rand -hex 32)}
    container_name: back 
    volumes:
      - db:/home/prisma
      - images:/home/front/src/img/userPfp
    networks:
      - transcendence
    restart: on-failure
    expose: 
      - "3000"
      - "3002"

networks:
  transcendence:
    driver: bridge

volumes:
  db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: 'back/volume'
  front:
  images:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: 'front/src/img/userPfp'

